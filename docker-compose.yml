services:
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: scale
      RABBITMQ_DEFAULT_PASS: scale_secret
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  orchestrator:
    build: ./orchestrator
    ports:
      - "3000:3000"
    environment:
      RABBITMQ_URL: amqp://scale:scale_secret@rabbitmq:5672
      ORCHESTRATOR_PORT: 3000
      ORCHESTRATOR_REPLY_PREFETCH: 50
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  logging-service:
    build: ./logging-service
    environment:
      RABBITMQ_URL: amqp://scale:scale_secret@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  worker-service:
    build:
      context: .
      dockerfile: worker-service/Dockerfile
    env_file:
      - .env
    environment:
      RABBITMQ_URL: amqp://scale:scale_secret@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
